{% extends "shop_flower/base.html" %}
{% load static %}

{% block content %}
<style>
    /* Custom CSS để bắt tone màu của CozyShop */
    .cozy-bg {
        background-color: #ff7c8a !important; /* Tone hồng cam giống thanh menu */
        color: white !important;
    }
    .cozy-text {
        color: #db3744 !important; /* Tone đỏ giống logo COZYSHOP và tiêu đề */
    }
    .cozy-btn {
        background-color: #db3744 !important;
        color: white !important;
        border: none;
        padding: 0.6rem 1rem;
    }
    .cozy-btn:hover {
        background-color: #c02c38 !important;
        color: white !important;
    }

    /* Responsive tweaks */
    .voucher-item img {
        width: 100%;
        height: 150px;
        object-fit: cover;
        border-top-left-radius: .375rem;
        border-top-right-radius: .375rem;
    }

    .cart-item-img {
        width: 60px;
        height: 60px;
        object-fit: cover;
        border-radius: 6px;
    }

    /* Touch targets on small screens */
    @media (max-width: 576px) {
        .cozy-btn {
            padding: 0.9rem 1rem;
            font-size: 1rem;
        }
        .voucher-item img {
            height: 120px;
        }
        .card-body .form-label {
            font-size: 0.95rem;
        }
    }

    /* Small visual improvements */
    .voucher-item:hover {
        transform: translateY(-3px);
        transition: transform 0.2s ease-in-out;
        box-shadow: 0 .5rem 1rem rgba(0,0,0,.15)!important;
    }

    /* Truncate long product names in table */
    .product-name {
        max-width: 180px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
</style>

<div class="container my-4">

  <h3 class="mb-4 cozy-text fw-bold">🧾 Thanh toán</h3>

  <div class="row g-3">

    <!-- Thay col-5 / col-7 bằng responsive cols: trên mobile thành full-width -->
    <div class="col-md-5 col-12 order-1">
        <div class="card">
            <div class="card-header cozy-bg fw-bold">
                Thông tin giao hàng
            </div>

            <div class="card-body">

                <div class="mb-3">
                    <label class="form-label">Họ tên</label>
                    <input
                        id="name"
                        class="form-control"
                        required
                        minlength="2"
                        placeholder="Nguyễn Văn A"
                        autocomplete="name"
                        aria-label="Họ tên người nhận"
                        maxlength="80"
                    >
                    <small class="text-danger d-none" id="err-name"></small>
                </div>

                <div class="mb-3">
                    <label class="form-label">Số điện thoại</label>
                    <input
                        id="phone"
                        class="form-control"
                        required
                        type="tel"
                        inputmode="tel"
                        pattern="^(0[0-9]{9})$"
                        placeholder="0xxxxxxxxx"
                        autocomplete="tel"
                        aria-label="Số điện thoại"
                        maxlength="11"
                    >
                    <small class="text-danger d-none" id="err-phone"></small>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input
                        id="email"
                        class="form-control"
                        type="email"
                        placeholder="email@gmail.com"
                        autocomplete="email"
                        aria-label="Email"
                    >
                    <small class="text-danger d-none" id="err-email"></small>
                </div>

                <div class="mb-3">
                    <label class="form-label">Địa chỉ giao hàng</label>
                    <textarea
                        id="address"
                        class="form-control"
                        rows="2"
                        required
                        minlength="10"
                        aria-label="Địa chỉ giao hàng"
                    ></textarea>
                    <small class="text-danger d-none" id="err-address"></small>
                </div>

                <div class="mb-3">
                    <label class="form-label">Ghi chú</label>
                    <textarea
                        id="note"
                        class="form-control"
                        rows="2"
                        aria-label="Ghi chú"
                    ></textarea>
                </div>
            </div>
        </div>
    </div>

  <div class="col-md-7 col-12 order-2">
    <div class="card mb-4">
        <div class="card-header cozy-bg fw-bold">
        Giỏ hàng của bạn
        </div>

        <div class="card-body p-0">
          <!-- table-responsive để trên mobile có thể scroll ngang nếu cần -->
          <div class="table-responsive">
            <table class="table mb-0 align-middle">
            <thead>
            <tr>
            <th></th>
            <th>Hoa</th>
            <th>Giá</th>
            <th>Số lượng</th>
            <th>Tạm tính</th>
            </tr>
            </thead>
            <tbody id="checkout-cart"></tbody>
            </table>
          </div>
        </div>

        <div class="card-footer text-end">
        <strong>
        Tổng tiền:
        <span id="checkout-total">0</span> VND
        </strong>
        </div>
        </div>
        
        <div class="mb-3">
            <label class="form-label">Voucher</label>

            <div class="d-flex align-items-center gap-2">
                <strong id="selected-voucher" class="cozy-text"></strong>

                <button
                    type="button"
                    class="btn btn-outline-secondary btn-sm"
                    data-bs-toggle="modal"
                    data-bs-target="#voucherModal"
                >
                    🎁 Chọn voucher
                </button>
            </div>
        </div>

        <button id="btn-order" class="btn cozy-btn rounded-pill fw-bold w-100" aria-label="Đặt hàng">
                ✅ Đặt hàng
        </button>
    </div>
    
    </div>

<!-- Modal voucher: modal-fullscreen-sm-down để fullscreen trên màn hình nhỏ -->
<div class="modal fade" id="voucherModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg modal-fullscreen-sm-down"> <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Chọn voucher</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Đóng"></button>
      </div>

      <div class="modal-body bg-light"> <div class="row row-cols-1 row-cols-sm-2 g-3">

          <div class="col">
            <div class="card h-100 shadow-sm voucher-item border-0" onclick="selectVoucher('freeship')" style="cursor: pointer;">
              <img
                 src="{% static 'shop_flower/vouchers/freeship.jpg' %}"
                 class="card-img-top img-fluid"
                 alt="Freeship Voucher"
              >
              <div class="card-body text-center p-2">
                <h6 class="card-title mb-1 fw-bold text-dark" style="font-size: 0.9rem;">Giao hàng miễn phí</h6>
                <p class="card-text small text-muted mb-0" style="font-size: 0.8rem;">Áp dụng toàn quốc</p>
              </div>
            </div>
          </div>

          <div class="col">
            <div class="card h-100 shadow-sm voucher-item border-0" onclick="selectVoucher('discount10')" style="cursor: pointer;">
              <img
                 src="{% static 'shop_flower/vouchers/discount10.jpg' %}"
                 class="card-img-top img-fluid"
                 alt="Discount Voucher"
              >
              <div class="card-body text-center p-2">
                <h6 class="card-title mb-1 fw-bold text-dark" style="font-size: 0.9rem;">Giảm 10% đơn đầu tiên</h6>
                <p class="card-text small text-muted mb-0" style="font-size: 0.8rem;">Tối đa 50.000đ</p>
              </div>
            </div>
          </div>

        </div> </div> </div>
  </div>
</div>

<!-- HIDDEN form chỉ để render CSRF token và tạo cookie -->
<form id="csrf-form" style="display:none;">
    {% csrf_token %}
</form>

<script>
/* CSRF helper: lấy token từ input hoặc cookie, gán vào window.CSRF_TOKEN để checkout.js dùng */
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            // cookie format "name=value"
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

// try lấy từ hidden input (rendered by {% csrf_token %})
let csrftoken = null;
const input = document.querySelector('#csrf-form input[name="csrfmiddlewaretoken"]');
if (input) csrftoken = input.value;

// fallback: lấy từ cookie
if (!csrftoken) csrftoken = getCookie('csrftoken');

window.CSRF_TOKEN = csrftoken;

/* Chọn voucher: set text và đóng modal (Bootstrap 5) */
function selectVoucher(code) {
    let label = '';
    if (code === 'freeship') label = 'Giao hàng miễn phí';
    else if (code === 'discount10') label = 'Giảm 10% (tối đa 50.000đ)';
    else label = code;

    document.getElementById('selected-voucher').textContent = label;

    // đóng modal
    try {
        const voucherModalEl = document.getElementById('voucherModal');
        const modalInstance = bootstrap.Modal.getInstance(voucherModalEl) || new bootstrap.Modal(voucherModalEl);
        modalInstance.hide();
    } catch (err) {
        console.warn('Không thể đóng modal tự động:', err);
    }
}

/* Gợi ý: nếu bạn muốn fetch POST luôn kèm X-CSRFToken, có thể bật wrapper fetch này.
   Nếu checkout.js đã xử lý fetch/axios, không cần dùng. */
if (typeof window.fetch === 'function') {
    const _origFetch = window.fetch;
    window.fetch = function(input, init = {}) {
        init.headers = init.headers || {};
        // chỉ set header nếu chưa có
        if (!init.headers['X-CSRFToken'] && window.CSRF_TOKEN) {
            init.headers['X-CSRFToken'] = window.CSRF_TOKEN;
        }
        return _origFetch(input, init);
    };
}
</script>

<script src="{% static 'shop_flower/js/checkout.js' %}"></script>
<script src="{% static 'shop_flower/js/validate.js' %}"></script>
{% endblock %}
